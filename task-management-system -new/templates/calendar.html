<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calendar</title>

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- FULL CALENDAR -->

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            background:#f4ecff;

            overflow-x:hidden;
        }

        /* SIDEBAR */

        .sidebar{

    width:270px;

    height:100vh;

    background:#3b0066;

    position:fixed;

    left:0;

    top:0;

    padding:30px 20px;

    overflow-y:scroll;

    overflow-x:hidden;

    z-index:1000;
}

.sidebar a{

    display:flex;

    align-items:center;

    gap:14px;

    color:white;

    text-decoration:none;

    padding:16px 18px;

    margin-bottom:16px;

    border-radius:18px;

    font-size:20px;

    font-weight:500;

    transition:0.3s;
}

        .sidebar h1{

            color:white;

            font-size:28px;

            margin-bottom:40px;

            font-weight:700;
        }

        .sidebar a{

            display:flex;

            align-items:center;

            gap:14px;

            color:white;

            text-decoration:none;

            padding:16px 18px;

            margin-bottom:16px;

            border-radius:18px;

            font-size:20px;

            font-weight:500;

            transition:0.3s;
        }

        .sidebar a:hover,
        .sidebar .active{

            background:linear-gradient(
                90deg,
                #c738ff,
                #ff77d9
            );
        }

        .sidebar i{

            font-size:20px;
        }

        /* MAIN CONTENT */

        .main{

            margin-left:270px;

            width:calc(100% - 270px);

            padding:30px;
        }

        .main h1{

            font-size:64px;

            color:#2b004d;

            margin-bottom:25px;

            font-weight:700;
        }

        /* CALENDAR BOX */

        .calendar-box{

            background:white;

            border-radius:30px;

            padding:25px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.08);

            overflow-x:auto;
        }

        #calendar{

            min-width:1000px;
        }

        /* FULLCALENDAR CUSTOM */

        .fc-toolbar-title{

            font-size:34px !important;

            font-weight:700 !important;

            color:#2b004d;
        }

        .fc-button{

            background:#3b0066 !important;

            border:none !important;

            padding:10px 18px !important;

            border-radius:12px !important;

            font-size:16px !important;

            font-weight:600 !important;
        }

        .fc-button:hover{

            background:#7b2cff !important;
        }

        .fc-daygrid-event{

            border:none !important;

            padding:4px 8px !important;

            border-radius:8px !important;

            font-size:13px !important;

            font-weight:500 !important;
        }

        .fc-daygrid-day-number{

            color:#2b004d !important;

            font-weight:600;
        }

        .fc-col-header-cell-cushion{

            color:#2b004d !important;

            font-weight:700 !important;

            text-decoration:none !important;
        }

        /* RESPONSIVE */

        @media(max-width:900px){

            .sidebar{

                width:220px;
            }

            .main{

                margin-left:220px;

                width:calc(100% - 220px);
            }

            .main h1{

                font-size:42px;
            }
        }

        html,
body{

    height:100%;

    overflow-x:hidden;
}

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h1>Task System</h1>

        <a href="/dashboard">

            <i class="fas fa-home"></i>

            Dashboard

        </a>

        <a href="/tasks">

            <i class="fas fa-list"></i>

            Tasks

        </a>

        <a href="/add-task">

            <i class="fas fa-plus"></i>

            Add Task

        </a>

        <a href="/completed">

            <i class="fas fa-check-circle"></i>

            Completed

        </a>

        <a class="active" href="/calendar">

            <i class="fas fa-calendar"></i>

            Calendar

        </a>

        <a href="/reports">

            <i class="fas fa-chart-bar"></i>

            Reports

        </a>

        <a href="/profile">

            <i class="fas fa-user"></i>

            Profile

        </a>

        <a href="/logout">

            <i class="fas fa-sign-out-alt"></i>

            Logout

        </a>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main">

        <h1>Calendar</h1>

        <div class="calendar-box">

            <div id="calendar"></div>

        </div>

    </div>

    <!-- CALENDAR SCRIPT -->

    <script>

        document.addEventListener(
        'DOMContentLoaded',

        function(){

            const calendarEl =
            document.getElementById('calendar');

            const calendar =
            new FullCalendar.Calendar(

                calendarEl,

                {

                    initialView:'dayGridMonth',

                    height:'auto',

                    events:'/calendar-data',

                    eventTextColor:'#fff',

                    headerToolbar:{

                        left:'prev,next today',

                        center:'title',

                        right:'dayGridMonth,timeGridWeek'
                    }

                }

            );

            calendar.render();

        });

    </script>

</body>

</html>

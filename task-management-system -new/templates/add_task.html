<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Task</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            135deg,
            #EFC3FF,
            #120026
            );

            overflow:hidden;
        }

        .glass-card{

            width:520px;

            padding:45px;

            border-radius:35px;

            background:
            rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);

            border:
            1px solid rgba(255,255,255,0.2);

            box-shadow:
            0 8px 32px rgba(0,0,0,0.25);

            color:white;
        }

        .logo-box{

            width:100px;
            height:100px;

            border-radius:28px;

            display:flex;
            justify-content:center;
            align-items:center;

            margin-bottom:35px;

            background:
            linear-gradient(
            135deg,
            #ff8cfb,
            #7a00ff
            );

            box-shadow:
            0 10px 25px rgba(122,0,255,0.4);
        }

        .logo-box i{

            font-size:42px;
            color:white;
        }

        h1{

            font-size:58px;
            font-weight:700;

            margin-bottom:10px;

            line-height:1.1;
        }

        .subtitle{

            color:#f3e5ff;

            margin-bottom:40px;

            font-size:20px;
        }

        .form-control{

            width:100%;

            height:65px;

            border:none;

            outline:none;

            padding:0 22px;

            margin-bottom:22px;

            border-radius:18px;

            background:
            rgba(255,255,255,0.18);

            color:white;

            font-size:18px;

            backdrop-filter:blur(10px);
        }

        .form-control::placeholder{
            color:#f1e3ff;
        }

        input[type="date"]{

            color:white;
        }

        .btn-task{

            width:100%;

            height:68px;

            border:none;

            border-radius:20px;

            font-size:30px;

            font-weight:700;

            cursor:pointer;

            color:white;

            margin-top:10px;

            background:
            linear-gradient(
            to right,
            #230046,
            #ff8cfb
            );

            transition:0.3s;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.25);
        }

        .btn-task:hover{

            transform:translateY(-3px);

            opacity:0.95;
        }

        .back-link{

            display:block;

            text-align:center;

            margin-top:30px;

            color:white;

            text-decoration:none;

            font-size:20px;

            font-weight:500;
        }

        .back-link:hover{

            color:#ffd6ff;
        }

        @media(max-width:600px){

            .glass-card{

                width:92%;
                padding:30px;
            }

            h1{

                font-size:42px;
            }

            .btn-task{

                font-size:24px;
            }

        }

    </style>

</head>

<body>

    <div class="glass-card">

        <div class="logo-box">
            <i class="fa-solid fa-list-check"></i>
        </div>

        <h1>Add New Task</h1>

        <p class="subtitle">
            Organize your work efficiently
        </p>

        <form action="/add_task" method="POST">

            <input type="text"
                name="task"
                class="form-control"
                placeholder="Enter Task"
                required>

            <input type="date"
                name="due_date"
                class="form-control"
                required>

            <button type="submit" class="btn-task">
                <i class="fa-solid fa-plus"></i>
                Add Task
            </button>

        </form>

        <a href="/tasks" class="back-link">
            ← Back to Tasks
        </a>

    </div>

</body>

</html>

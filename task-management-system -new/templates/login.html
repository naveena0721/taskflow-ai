<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Task Management Login</title>

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;

            background:
            linear-gradient(
            135deg,
            #EFC3FF,
            #120026
            );

            overflow:hidden;
        }

        /* MAIN CONTAINER */

        .login-container{

            width:100%;
            max-width:1100px;

            height:650px;

            display:flex;

            overflow:hidden;

            border-radius:35px;

            background:
            rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            border:
            1px solid rgba(255,255,255,0.12);

            box-shadow:
            0 20px 60px rgba(0,0,0,0.35);
        }

        /* LEFT SIDE */

        .left-panel{

            width:50%;

            background:
            linear-gradient(
            180deg,
            #3f006d,
            #120026
            );

            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;

            text-align:center;

            padding:55px;

            color:white;
        }

        .logo-box{

            width:140px;
            height:140px;

            border-radius:38px;

            display:flex;
            justify-content:center;
            align-items:center;

            margin-bottom:35px;

            background:
            linear-gradient(
            135deg,
            #ff9cfb,
            #8a00ff
            );

            box-shadow:
            0 0 40px rgba(255,255,255,0.18);
        }

        .logo-box i{

            font-size:58px;

            color:white;
        }

        .left-panel h1{

            font-size:46px;

            font-weight:800;

            line-height:1.3;

            margin-bottom:22px;
        }

        .left-panel p{

            font-size:18px;

            line-height:1.8;

            color:#f3dfff;

            max-width:420px;
        }

        /* RIGHT SIDE */

        .right-panel{

            width:50%;

            padding:65px 60px;

            display:flex;
            justify-content:center;
            flex-direction:column;

            background:
            rgba(255,255,255,0.12);

            backdrop-filter:blur(20px);

            color:white;
        }

        .right-panel h2{

            font-size:54px;

            font-weight:800;

            margin-bottom:12px;
        }

        .subtitle{

            font-size:18px;

            color:#f2e4ff;

            margin-bottom:45px;
        }

        .input-group{

            margin-bottom:28px;
        }

        .input-group label{

            display:block;

            margin-bottom:12px;

            font-size:17px;

            font-weight:500;
        }

        .input-box{

            width:100%;

            height:60px;

            border:none;

            outline:none;

            padding:0 22px;

            border-radius:18px;

            font-size:16px;

            color:white;

            background:
            rgba(255,255,255,0.10);

            border:
            1px solid rgba(255,255,255,0.15);

            transition:0.3s;
        }

        .input-box::placeholder{

            color:#ece0ff;
        }

        .input-box:focus{

            border:
            1px solid #ff9cfb;

            box-shadow:
            0 0 10px rgba(255,156,251,0.4);
        }

        /* BUTTON */

        .login-btn{

            width:100%;

            height:62px;

            border:none;

            border-radius:18px;

            margin-top:12px;

            cursor:pointer;

            color:white;

            font-size:22px;

            font-weight:700;

            background:
            linear-gradient(
            90deg,
            #2a0047,
            #f08fff
            );

            transition:0.3s;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.25);
        }

        .login-btn:hover{

            transform:translateY(-3px);

            opacity:0.96;
        }

        /* BOTTOM */

        .bottom-text{

            text-align:center;

            margin-top:35px;

            font-size:17px;

            color:#f3e5ff;
        }

        .bottom-text a{

            color:#ff9cfb;

            text-decoration:none;

            font-weight:600;
        }

        .bottom-text a:hover{

            text-decoration:underline;
        }

        /* MOBILE */

        @media(max-width:950px){

            .login-container{

                flex-direction:column;

                height:auto;
            }

            .left-panel,
            .right-panel{

                width:100%;
            }

            .left-panel{

                padding:45px 30px;
            }

            .right-panel{

                padding:45px 30px;
            }

            .left-panel h1{

                font-size:38px;
            }

            .right-panel h2{

                font-size:42px;
            }

            .logo-box{

                width:110px;
                height:110px;
            }

            .logo-box i{

                font-size:45px;
            }

        }

    </style>

</head>

<body>

    <div class="login-container">

        <!-- LEFT -->

        <div class="left-panel">

            <div class="logo-box">
                <i class="fa-solid fa-list-check"></i>
            </div>

            <h1>
                Task Management
                System
            </h1>

            <p>
                Organize your workflow,
                manage deadlines and boost
                productivity professionally.
            </p>

        </div>

        <!-- RIGHT -->

        <div class="right-panel">

            <h2>Welcome Back</h2>

            <p class="subtitle">
                Login to continue managing your tasks
            </p>

            <form action="/" method="POST">

                <div class="input-group">

                    <label>Email Address</label>

                    <input type="email"
                        name="email"
                        class="input-box"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input type="password"
                        name="password"
                        class="input-box"
                        placeholder="Enter your password"
                        required>

                </div>

                <button type="submit"
                    class="login-btn">

                    Login

                </button>

            </form>

            <div class="bottom-text">

                Don't have an account?

                <a href="/signup">
                    Create Account
                </a>

            </div>

        </div>

    </div>

</body>

</html>
